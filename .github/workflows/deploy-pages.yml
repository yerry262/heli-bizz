name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "frontend/**"
      - "data/entities.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build dashboard from source
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Assemble site
        # The app fetches ../data/entities.json; with dashboard files at the
        # site root, that resolves to /data/entities.json.
        run: |
          mkdir -p site/data
          cp dashboard/index.html dashboard/app.js dashboard/styles.css site/
          cp data/entities.json site/data/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
